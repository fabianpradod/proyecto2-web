name: CI

on:
  push:
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: calculadora-react

      - name: Run lint
        run: bun run lint
        working-directory: calculadora-react

      - name: Run tests
        run: bun run test -- --run
        working-directory: calculadora-react

      - name: Build app
        run: bun run build
        working-directory: calculadora-react